<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot - Recipe Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f8f8f8;
        }
        h2 {
            color: #2c3e50;
        }
        #recipes {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h2>Recommended Recipes</h2>
    <div id="recipes">Loading...</div>

    <script>
        // Extract ingredients from URL
        const params = new URLSearchParams(window.location.search);
        const ingredients = params.get("ingredients");

        if (!ingredients) {
            document.getElementById("recipes").innerHTML = "<p>No ingredients provided.</p>";
        } else {
            // Fetch recipes from backend
            fetch('http://127.0.0.1:5000/get-recipe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ingredients: ingredients })
            })
            .then(response => response.json())
            .then(data => {
                let output = "<h3>Recommended Recipes:</h3>";

                if (data.recipes && data.recipes.length > 0) {
                    data.recipes.forEach(recipe => {
                        output += `
                            <div style="margin-bottom: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 10px; background: white;">
                                <h4>${recipe.recipe_name}</h4>
                                <p><strong>Ingredients:</strong> ${recipe.recipe_ingredients}</p>
                                <p><strong>Instructions:</strong> ${recipe.instructions}</p>
                            </div>
                        `;
                    });
                } else {
                    output += "<p>No suitable recipes found. Try different ingredients.</p>";
                }

                document.getElementById("recipes").innerHTML = output;
            })
            .catch(error => {
                document.getElementById("recipes").innerHTML = "<p>Error fetching recipes.</p>";
            });
        }
    </script>
</body>
</html>
