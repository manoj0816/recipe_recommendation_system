<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooking Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-image: url('recipes2.png'); /* Background image */
            background-size: cover;
            background-position: center;
            text-align: center;
        }

        /* Top Navigation */
        .top-nav {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .top-nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .top-nav ul li {
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            padding: 10px;
            position: relative;
        }

        .top-nav ul li a {
            text-decoration: none;
            color: white;
        }

        /* Pop-up menu */
        .recipes-popup {
            display: none;
            position: absolute;
            background: rgba(7, 7, 7, 0.95);
            border: 2px solid black;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            padding: 10px;
            width: 180px;
            left: 50%;
            transform: translateX(-50%);
            top: 40px;
            z-index: 10;
            transition: opacity 0.3s ease-in-out;
        }

        .recipes-popup a {
            display: block;
            padding: 10px;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .recipes-popup a:hover {
            background: #aff7a1;
        }

        /* Show pop-up on hover */
        .recipes-container:hover .recipes-popup {
            display: block;
        }

        /* JavaScript Toggle for Click */
        .show-popup {
            display: block !important;
        }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <div class="top-nav">
        <ul>
            <li><a href="home.html">Home</a></li>
            <li class="recipes-container" onclick="togglePopup()">Recipes
                <div class="recipes-popup" id="recipesPopup">
                    <a href="vegetarian.html">Vegetarian</a>
                    <a href="non-vegetarian.html">Non-Vegetarian</a>
                </div>
            </li>
            <li><a href="about.html">About</a></li>
        </ul>
    </div>

    <script>
        function togglePopup() {
            var popup = document.getElementById("recipesPopup");
            popup.classList.toggle("show-popup");
        }

        // Close the popup when clicking outside
        document.addEventListener("click", function(event) {
            var recipesContainer = document.querySelector(".recipes-container");
            var popup = document.getElementById("recipesPopup");

            if (!recipesContainer.contains(event.target)) {
                popup.classList.remove("show-popup");
            }
        });
    </script>

</body>
</html>
